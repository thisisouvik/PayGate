name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  # Layer 1 — Soroban contract unit tests (fast, no network)
  contract-tests:
    name: Contract Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Run Soroban unit tests
        run: cd contracts/receipt-verifier && cargo test

  # Layer 2 — Next.js Application tests (Lint, Build, Vitest)
  app-tests:
    name: App Tests (Lint, Build, Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
