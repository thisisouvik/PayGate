name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  # Layer 1 — Soroban contract unit tests (fast, no network)
  contract-tests:
    name: Contract Tests (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Run Soroban unit tests
        run: cd contracts/receipt-verifier && cargo test

  # Layer 2 — Next.js Application tests (Lint + Build)
  app-tests:
    name: App Tests (Lint, Build)
    runs-on: ubuntu-latest
    # Stub env vars so `next build` can load modules without real secrets.
    # These are NOT used at runtime — only so the TypeScript compiler and
    # module initializers don't crash during the build phase.
    env:
      DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
      DIRECT_URL: "postgresql://fake:fake@localhost:5432/fake"
      UPSTASH_REDIS_REST_URL: "https://fake.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "fake_token"
      PAYGATE_TREASURY_WALLET: "GBZXN7PIRZGNMHGA7MUUUF4GWPY5AYPGZFH2I2IXIHLKZONE7ZTQQJL"
      PAYGATE_TREASURY_SECRET_KEY: "SBFGZKZIKQFZNMWZODVOHKQCFGDILR5KLXHJKRWMFZRVKBF6E5B2YWY"
      STELLAR_NETWORK: "testnet"
      SOROBAN_CONTRACT_ID: "CDOF7XY3MGEKY3MNNJF5STMADAQRAFSHXP7WQIOCPEXM7O3BTPZYF7WH"
      SOROBAN_USDC_CONTRACT: "CDOF7XY3MGEKY3MNNJF5STMADAQRAFSHXP7WQIOCPEXM7O3BTPZYF7WH"
      AGENT_STELLAR_SECRET_KEY: "SBFGZKZIKQFZNMWZODVOHKQCFGDILR5KLXHJKRWMFZRVKBF6E5B2YWY"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx prisma generate
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
